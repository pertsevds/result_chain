name: CI

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test_matrix:
    name: ${{ matrix.os }}, Erlang/OTP ${{ matrix.otp-version }} Elixir ${{ matrix.elixir-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            elixir-version: 1.19
            otp-version: 28
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir-version }}
          otp-version: ${{ matrix.otp-version }}

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-${{ matrix.elixir-version }}-${{ matrix.otp-version }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.elixir-version }}-${{ matrix.otp-version }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Run mix format
        run: mix format --check-formatted

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run Credo (basic)
        run: mix credo --strict

      - name: Check unused dependencies
        run: mix deps.unlock --check-unused

      - name: Run tests
        run: mix test

      - name: Test coverage
        if: matrix.elixir-version == '1.19' && matrix.otp-version == '28'
        run: mix test --cover

      - name: Test if docs can be built
        if: matrix.elixir-version == '1.19' && matrix.otp-version == '28'
        run: mix docs

      - name: Check Hex package can be built
        if: matrix.elixir-version == '1.19' && matrix.otp-version == '28'
        run: mix hex.build

  ci-ok:
    name: ci-ok
    runs-on: ubuntu-latest
    needs: [test_matrix]
    if: ${{ always() }}
    steps:
      - name: Fail if matrix failed
        run: |
          if [ "${{ needs.test_matrix.result }}" != "success" ]; then
            echo "At least one matrix job failed"
            exit 1
          fi
